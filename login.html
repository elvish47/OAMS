<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignment Manager · Login</title>
 
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #f0f5ff 0%, #e6edf7 100%);
      padding: 1.5rem;
    }

    .login-card {
      max-width: 420px;
      width: 100%;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 40px;
      padding: 2.5rem 2rem 2.8rem;
      box-shadow: 0 20px 50px rgba(0, 20, 40, 0.20), 0 8px 24px rgba(0, 0, 0, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.4);
      transition: transform 0.2s ease;
    }

    .login-card:hover {
      transform: translateY(-2px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.8rem;
    }

    .brand i {
      font-size: 2.2rem;
      color: #2a4b7c;
      background: rgba(42, 75, 124, 0.10);
      padding: 0.5rem;
      border-radius: 16px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.02);
    }

    .brand h1 {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: #0b1e33;
    }

    .brand span {
      color: #2a4b7c;
      font-weight: 300;
    }

    .subhead {
      font-size: 0.95rem;
      color: #2c3e5c;
      margin-bottom: 2rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid rgba(42, 75, 124, 0.10);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .subhead i {
      color: #3a6a9e;
      font-size: 0.9rem;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .input-group label {
      font-size: 0.9rem;
      font-weight: 500;
      color: #1a2f47;
      letter-spacing: 0.01em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .input-group label i {
      color: #2a4b7c;
      font-size: 0.9rem;
      width: 1.2rem;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      background: white;
      border-radius: 30px;
      border: 1.5px solid #d9e2ef;
      transition: all 0.2s;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
    }

    .input-wrapper:focus-within {
      border-color: #2a4b7c;
      box-shadow: 0 4px 12px rgba(42, 75, 124, 0.15);
      background: white;
    }

    .input-wrapper i {
      color: #6f8aa8;
      padding: 0 0 0 1.1rem;
      font-size: 1rem;
      transition: color 0.2s;
    }

    .input-wrapper:focus-within i {
      color: #2a4b7c;
    }

    .input-wrapper input {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 0.8rem;
      border: none;
      background: transparent;
      font-size: 1rem;
      font-weight: 450;
      color: #0b1e33;
      outline: none;
    }

    .input-wrapper input::placeholder {
      color: #99b0cc;
      font-weight: 350;
      font-size: 0.95rem;
    }

    .input-wrapper .toggle-password {
      background: transparent;
      border: none;
      color: #7d96b2;
      padding: 0 1.1rem 0 0.5rem;
      cursor: pointer;
      font-size: 1rem;
      transition: color 0.2s;
    }

    .input-wrapper .toggle-password:hover {
      color: #1f3b5c;
    }

    .options-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0.2rem 0 0.4rem;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: #1f334b;
      cursor: pointer;
    }

    .remember-me input[type="checkbox"] {
      width: 1.1rem;
      height: 1.1rem;
      accent-color: #2a4b7c;
      border-radius: 4px;
      cursor: pointer;
    }

    .forgot-link {
      font-size: 0.9rem;
      color: #2a4b7c;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s;
      border-bottom: 1px solid transparent;
    }

    .forgot-link:hover {
      color: #0f2b47;
      border-bottom-color: #2a4b7c;
    }

    .login-btn {
      background: #1d3b5e;
      border: none;
      padding: 1rem 1.2rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1.1rem;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 6px 18px rgba(26, 55, 94, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.1);
      letter-spacing: 0.3px;
      margin-top: 0.2rem;
    }

    .login-btn i {
      font-size: 1.1rem;
      transition: transform 0.25s;
    }

    .login-btn:hover {
      background: #12304e;
      box-shadow: 0 10px 24px rgba(18, 48, 78, 0.35);
      transform: scale(1.01);
    }

    .login-btn:hover i {
      transform: translateX(4px);
    }

    .login-btn:active {
      transform: scale(0.97);
    }

    .signup-section {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.95rem;
      color: #1f334b;
    }

    .signup-section a {
      color: #1d3b5e;
      font-weight: 600;
      text-decoration: none;
      border-bottom: 1.5px solid transparent;
      transition: border-color 0.2s, color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .signup-section a i {
      font-size: 0.8rem;
      transition: transform 0.2s;
    }

    .signup-section a:hover {
      color: #0b1e33;
      border-bottom-color: #1d3b5e;
    }

    .signup-section a:hover i {
      transform: translateX(3px);
    }

    @media (max-width: 460px) {
      .login-card {
        padding: 2rem 1.2rem 2rem;
      }
      .brand h1 {
        font-size: 1.6rem;
      }
      .options-row {
        flex-wrap: wrap;
        gap: 0.6rem;
      }
    }

    .input-wrapper i:first-child {
      margin-left: 0.2rem;
    }
  </style>
</head>
<body>

<div class="login-card">

  <div class="brand">
    <i class="fas fa-pencil-alt"></i>
    <h1>Assign<span>Flow</span></h1>
  </div>
  <div class="subhead">
    <i class="fas fa-arrow-right-to-bracket"></i> 
    <span>Sign in to manage assignments</span>
  </div>

  <form class="login-form" id="loginForm" action="#" method="POST" onsubmit="event.preventDefault(); alert('Login demo – you can hook up your backend.');">
 
    <div class="input-group">
      <label for="loginEmail"><i class="fas fa-envelope"></i> Email or username</label>
      <div class="input-wrapper">
        <i class="fas fa-user"></i>
        <input type="email" id="loginEmail" value="demo@assignflow.com" required>
      </div>
    </div>

    <div class="input-group">
      <label for="loginPassword"><i class="fas fa-lock"></i> Password</label>
      <div class="input-wrapper">
        <i class="fas fa-key"></i>
        <input type="password" id="loginPassword"  value="password123" required>
        <button type="button" class="toggle-password" id="togglePasswordBtn" aria-label="Toggle password visibility">
          <i class="fas fa-eye" id="eyeIcon"></i>
        </button>
      </div>
    </div>

    <div class="options-row">
      <label class="remember-me">
        <input type="checkbox" checked> Remember me
      </label>
      <a href="#" class="forgot-link">Forgot password?</a>
    </div>

    <button type="submit" class="login-btn">
      <span>Log in</span>
      <i class="fas fa-arrow-right"></i>
    </button>
  </form>

  <div class="signup-section">
    Don’t have an account? 
    <a href="#">
      Create account <i class="fas fa-chevron-right"></i>
    </a>
  </div>
</div>

</body>
</html>
